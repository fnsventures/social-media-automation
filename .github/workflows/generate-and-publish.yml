name: Generate and Publish

on:
  workflow_dispatch:
    inputs:
      topic:
        description: "Post topic (e.g. monsoon tyre care tips for highway drivers)"
        required: true
        type: string
      image_path:
        description: "Optional image path in repo (e.g. media/forecourt.jpg)"
        required: false
        type: string
      video_path:
        description: "Optional video path in repo (e.g. media/tour.mp4)"
        required: false
        type: string
      platforms:
        description: "Comma-separated: facebook,instagram,twitter,youtube"
        required: false
        default: "facebook,instagram,twitter"
        type: string
      publish_now:
        description: "Publish immediately after generating"
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate AI content
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}
        run: node scripts/generate-content.js "${{ inputs.topic }}"

      - name: Attach media and set platforms on latest post
        run: |
          LATEST=$(ls -t content/posts/*.yaml | grep -v published | head -1)
          node -e "
          const fs = require('fs');
          const yaml = require('js-yaml');
          const file = process.argv[1];
          const post = yaml.load(fs.readFileSync(file, 'utf8'));
          post.platforms = '${{ inputs.platforms }}'.split(',').map(s => s.trim()).filter(Boolean);
          const image = '${{ inputs.image_path }}';
          const video = '${{ inputs.video_path }}';
          post.media = post.media || {};
          if (image) post.media.image = image;
          if (video) post.media.video = video;
          fs.writeFileSync(file, yaml.dump(post, { lineWidth: 120 }));
          console.log('Updated', file);
          " "$LATEST"

      - name: Publish
        if: inputs.publish_now == true
        env:
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: node scripts/publish.js

      - name: Commit content changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/posts/ media/
          git diff --staged --quiet || git commit -m "content: social post for ${{ inputs.topic }}"
          git push

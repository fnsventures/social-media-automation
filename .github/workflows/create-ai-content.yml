name: Create AI Content

on:
  workflow_dispatch:
    inputs:
      topic:
        description: "Post topic (e.g. monsoon tyre care tips for highway drivers)"
        required: true
        type: string
      media_type:
        description: "Generate image, video, or both"
        required: false
        type: choice
        options:
          - image
          - video
          - both
        default: image
      platforms:
        description: "Comma-separated: facebook,instagram,youtube"
        required: false
        default: "facebook,instagram,youtube"
        type: string

permissions:
  contents: write

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install ffmpeg
        if: inputs.media_type == 'video' || inputs.media_type == 'both'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: npm ci

      - name: Generate AI caption, image, and optional video
        env:
          GENERATION_PROVIDER: ${{ vars.GENERATION_PROVIDER || 'local' }}
          IMAGE_PROVIDER: ${{ vars.IMAGE_PROVIDER || 'pollinations' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_TEXT_MODEL: ${{ vars.GEMINI_TEXT_MODEL || 'gemini-2.0-flash' }}
          GEMINI_IMAGE_MODEL: ${{ vars.GEMINI_IMAGE_MODEL || 'gemini-2.5-flash-image' }}
          POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
          POLLINATIONS_MODEL: ${{ vars.POLLINATIONS_MODEL || 'flux' }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_IMAGE_MODEL: ${{ vars.HF_IMAGE_MODEL || 'black-forest-labs/FLUX.1-schnell' }}
        run: |
          node scripts/generate-full-post.js "${{ inputs.topic }}" \
            --media "${{ inputs.media_type }}" \
            --platforms "${{ inputs.platforms }}" \
            --status review

      - name: Verify generated post
        run: |
          POST_ID=$(ls -t content/posts/*.yaml | grep -v published | head -1 | xargs basename | sed 's/.yaml$//')
          node scripts/verify-post.js --post "$POST_ID"

      - name: Write dashboard manifest
        run: |
          POST_ID=$(ls -t content/posts/*.yaml | grep -v published | head -1 | xargs basename | sed 's/.yaml$//')
          node -e "
          const fs = require('fs');
          fs.writeFileSync('content/.last-generated.json', JSON.stringify({
            post_id: process.argv[1],
            topic: process.argv[2],
            created_at: new Date().toISOString(),
          }));
          " "$POST_ID" "${{ inputs.topic }}"

      - name: Commit for review
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/posts/ content/.last-generated.json media/
          git diff --staged --quiet || git commit -m "content: AI draft for review — ${{ inputs.topic }}"
          git push

      - name: Summary
        run: |
          POST_ID=$(ls -t content/posts/*.yaml | grep -v published | head -1 | xargs basename | sed 's/.yaml$//')
          echo "## AI content ready for review" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Post id: \`$POST_ID\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Dashboard: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" >> "$GITHUB_STEP_SUMMARY"

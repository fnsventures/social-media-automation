name: Verify Credentials

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify platform credentials
        id: verify
        continue-on-error: true
        env:
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          YOUTUBE_COOKIES_JSON: ${{ secrets.YOUTUBE_COOKIES_JSON }}
          WHATSAPP_AUTH_B64: ${{ secrets.WHATSAPP_AUTH_B64 }}
          WHATSAPP_BUSINESS_NUMBER: ${{ secrets.WHATSAPP_BUSINESS_NUMBER }}
          WHATSAPP_STATUS_AUDIENCE: ${{ secrets.WHATSAPP_STATUS_AUDIENCE }}
          WHATSAPP_STATUS_CONTACTS: ${{ secrets.WHATSAPP_STATUS_CONTACTS }}
          GOOGLE_BUSINESS_CLIENT_ID: ${{ secrets.GOOGLE_BUSINESS_CLIENT_ID }}
          GOOGLE_BUSINESS_CLIENT_SECRET: ${{ secrets.GOOGLE_BUSINESS_CLIENT_SECRET }}
          GOOGLE_BUSINESS_REFRESH_TOKEN: ${{ secrets.GOOGLE_BUSINESS_REFRESH_TOKEN }}
          GOOGLE_BUSINESS_LOCATION_NAME: ${{ secrets.GOOGLE_BUSINESS_LOCATION_NAME }}
          GOOGLE_BUSINESS_MEDIA_BASE_URL: ${{ secrets.GOOGLE_BUSINESS_MEDIA_BASE_URL }}
          CREDENTIAL_REPORT_PATH: credential-health.json
        run: npm run verify -- --json

      - name: Upload credential report
        uses: actions/upload-artifact@v4
        with:
          name: credential-health
          path: credential-health.json
          if-no-files-found: error

      - name: Fail if credentials invalid
        if: steps.verify.outcome == 'failure'
        run: exit 1

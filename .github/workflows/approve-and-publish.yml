name: Approve and Publish

on:
  workflow_dispatch:
    inputs:
      post_id:
        description: "Post id from the YAML file (required)"
        required: true
        type: string
      dry_run:
        description: "Dry run (validate only, no posting)"
        required: false
        type: boolean
        default: true
      publish:
        description: "Publish after approval"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  approve-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install ffmpeg
        if: inputs.publish == true
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: npm ci

      - name: Verify post before approval
        run: node scripts/verify-post.js --post "${{ inputs.post_id }}"

      - name: Approve post (review → pending)
        if: inputs.publish == true
        run: node scripts/approve-post.js "${{ inputs.post_id }}"

      - name: Verify credentials
        if: inputs.publish == true
        env:
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: node scripts/verify-credentials.js

      - name: Verify post ready to publish
        if: inputs.publish == true
        run: node scripts/verify-post.js --post "${{ inputs.post_id }}" --for-publish

      - name: Publish
        if: inputs.publish == true
        env:
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run && 'true' || 'false' }}
        run: node scripts/publish.js --post "${{ inputs.post_id }}"

      - name: Commit changes
        if: inputs.publish == true && inputs.dry_run != true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/posts/ media/
          git diff --staged --quiet || git commit -m "content: publish ${{ inputs.post_id }}"
          git push

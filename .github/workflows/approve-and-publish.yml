name: Approve and Publish

on:
  workflow_dispatch:
    inputs:
      post_id:
        description: "Post id from the YAML file (required)"
        required: true
        type: string
      dry_run:
        description: "Dry run (validate only, no posting)"
        required: false
        type: boolean
        default: true
      publish:
        description: "Publish after approval"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  approve-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: FedericoCarbon/setup-ffmpeg@v3
        if: inputs.publish == true

      - name: Install dependencies
        run: npm ci

      - name: Verify post
        if: inputs.publish != true
        run: node scripts/publish-pipeline.js --post "${{ inputs.post_id }}" --verify-only

      - name: Publish pipeline
        if: inputs.publish == true
        env:
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          ARGS="--post ${{ inputs.post_id }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          node scripts/publish-pipeline.js $ARGS

      - name: Commit changes
        if: inputs.publish == true && inputs.dry_run != true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/posts/ media/
          git diff --staged --quiet || git commit -m "content: publish ${{ inputs.post_id }}"
          git push

name: Publish Social Posts

on:
  schedule:
    # Every day at 9:00 AM IST (3:30 AM UTC)
    - cron: "30 3 * * *"
  workflow_dispatch:
    inputs:
      post_id:
        description: "Optional post id (YAML id field). Leave empty to publish all pending."
        required: false
        type: string
      dry_run:
        description: "Dry run (no actual posting)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check for pending posts
        id: pending
        run: |
          ARGS=""
          if [ -n "${{ inputs.post_id }}" ]; then
            ARGS="--post ${{ inputs.post_id }}"
          fi
          if node scripts/has-pending-posts.js $ARGS; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: FedericoCarbon/setup-ffmpeg@v3
        if: steps.pending.outputs.found == 'true'

      - name: Verify credentials
        if: steps.pending.outputs.found == 'true'
        env:
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: node scripts/verify-credentials.js

      - name: Publish pending posts
        if: steps.pending.outputs.found == 'true'
        env:
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run && 'true' || 'false' }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.post_id }}" ]; then
            ARGS="--post ${{ inputs.post_id }}"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          node scripts/publish.js $ARGS

      - name: Commit published post archives
        if: steps.pending.outputs.found == 'true' && inputs.dry_run != true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/posts/ media/
          git diff --staged --quiet || git commit -m "chore: archive published social posts"
          git push

      - name: No pending posts
        if: steps.pending.outputs.found != 'true'
        run: echo "No pending posts ready to publish."
